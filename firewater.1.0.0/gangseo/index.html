<!DOCTYPE html>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, 'Noto Sans KR', sans-serif; }
  #map { width: 100%; height: 100vh; }

  #top-controls {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 10; width: 92%; max-width: 580px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .row { display: flex; gap: 8px; }
  #top-controls select {
    flex: 1; padding: 10px 8px; font-size: 14px;
    border: none; border-radius: 10px; background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,.25); cursor: pointer;
  }
  #search-row {
    display: flex; background: white; border-radius: 50px;
    box-shadow: 0 2px 8px rgba(0,0,0,.25); overflow: hidden;
  }
  #search-row input {
    flex: 1; border: none; padding: 11px 16px; font-size: 14px; outline: none;
  }
  #searchBtn {
    padding: 0 20px; background: #2ab56f; color: white;
    border: none; cursor: pointer; font-size: 14px; font-weight: bold;
  }

  #bottom-controls {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 10; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: center;
  }
  .map-btn {
    padding: 11px 18px; background: #2ab56f; color: white;
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }
  .map-btn.red  { background: #e74c3c; }
  .map-btn.blue { background: #3498db; }
  #result-count {
    padding: 6px 14px; background: rgba(0,0,0,.65); color: white;
    border-radius: 20px; font-size: 13px; white-space: nowrap;
  }

  #login-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 100;
    justify-content: center; align-items: center;
  }
  #login-box {
    background: white; border-radius: 16px; padding: 32px 28px; width: 320px;
    display: flex; flex-direction: column; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  .auth-tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 4px; }
  .auth-tab {
    flex: 1; padding: 10px; background: none; border: none; cursor: pointer;
    font-size: 14px; color: #888; font-weight: 500;
  }
  .auth-tab.active { color: #2ab56f; border-bottom: 2px solid #2ab56f; margin-bottom: -2px; }
  #login-box input {
    padding: 12px 14px; border: 1px solid #ddd;
    border-radius: 8px; font-size: 14px; outline: none;
  }
  #login-box input:focus { border-color: #2ab56f; }
  #login-submit {
    padding: 13px; background: #2ab56f; color: white;
    border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold;
  }
  #login-cancel {
    padding: 13px; background: #f0f0f0; color: #555;
    border: none; border-radius: 8px; cursor: pointer; font-size: 14px;
  }
  #login-error { display: none; color: #e74c3c; font-size: 13px; text-align: center; }
  #login-success { display: none; color: #2ab56f; font-size: 13px; text-align: center; }

  #loading {
    display: none; position: fixed; top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    background: rgba(0,0,0,.72); color: white;
    padding: 18px 28px; border-radius: 12px; z-index: 200; font-size: 15px;
  }

  /* ── 내 용수 목록 모달 ── */
  #my-list-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.55); z-index: 100;
    justify-content: center; align-items: center;
  }
  #my-list-box {
    background: white; border-radius: 16px; padding: 24px 20px; width: 380px;
    max-height: 82vh; display: flex; flex-direction: column; gap: 0;
    box-shadow: 0 8px 32px rgba(0,0,0,.3);
  }
  #my-list-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px;
  }
  #my-list-header h3 { font-size: 16px; font-weight: bold; }
  #my-list-close {
    background: none; border: none; font-size: 22px; cursor: pointer; color: #aaa; line-height: 1;
  }
  #my-list-content { flex: 1; overflow-y: auto; min-height: 60px; }
  .my-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px;
  }
  .my-item:last-child { border-bottom: none; }
  .my-item-info { flex: 1; line-height: 1.55; }
  .my-item-info .num { font-weight: bold; font-size: 14px; }
  .my-item-info .sub { color: #888; font-size: 12px; }
  .my-item-del {
    padding: 7px 11px; background: #e74c3c; color: white;
    border: none; border-radius: 6px; cursor: pointer; font-size: 12px; flex-shrink: 0;
  }
  #my-list-footer {
    display: flex; gap: 8px; margin-top: 14px; padding-top: 14px;
    border-top: 1px solid #eee;
  }
  #my-list-footer button { flex: 1; }

  @media (max-width: 480px) {
    #top-controls { width: 96%; }
    #top-controls select, #searchBtn, .map-btn { font-size: 12px; }
    #login-box { width: 290px; padding: 24px 20px; }
    #my-list-box { width: 92vw; }
  }
</style>

<div id="map"></div>

<div id="top-controls">
  <div class="row">
    <select id="gu-select">
      <option value="">-- 소방서 선택 --</option>
    </select>
    <select id="center-select">
      <option value="">-- 센터 선택 --</option>
    </select>
  </div>
  <div id="search-row">
    <input type="text" id="search" placeholder="용수 번호 또는 주소로 검색">
    <button id="searchBtn">검색</button>
  </div>
</div>

<div id="bottom-controls">
  <button class="map-btn" id="location-btn">내 위치</button>
  <button class="map-btn" id="my-list-open-btn" style="display:none;background:#e67e22" onclick="openMyHydrantsList()">내 용수 확인</button>
  <button class="map-btn blue" id="my-hydrants-btn" style="display:none" onclick="loadMyHydrantsOnMap()">내 용수 불러오기</button>
  <div id="result-count" style="display:none"></div>
  <button class="map-btn red" id="logout-btn" style="display:none">로그아웃</button>
</div>

<div id="login-modal">
  <div id="login-box">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login"   onclick="switchTab('login')">로그인</button>
      <button class="auth-tab"        id="tab-signup"  onclick="switchTab('signup')">회원가입</button>
    </div>
    <input type="email"    id="login-email"  placeholder="이메일 주소">
    <input type="password" id="login-pw"     placeholder="비밀번호">
    <input type="password" id="signup-pw2"   placeholder="비밀번호 확인" style="display:none">
    <div id="signup-notice" style="display:none;font-size:12px;color:#666;background:#f8f8f8;padding:10px;border-radius:8px;line-height:1.6;">
      ※ 가입은 <b>서울시 공무원 이메일(@seoul.go.kr)</b>만 가능합니다.<br>
      가입 후 소화전 용수확인 기록이 실시간 저장됩니다.
    </div>
    <div id="login-error"></div>
    <div id="login-success"></div>
    <button id="login-submit">로그인</button>
    <button id="login-cancel">취소</button>
  </div>
</div>

<div id="my-list-modal">
  <div id="my-list-box">
    <div id="my-list-header">
      <h3>내 용수 목록</h3>
      <button id="my-list-close" onclick="document.getElementById('my-list-modal').style.display='none'">✕</button>
    </div>
    <div id="my-list-content">
      <div style="text-align:center;padding:24px;color:#aaa;">로딩 중...</div>
    </div>
    <div id="my-list-footer">
      <button class="map-btn blue" onclick="loadMyHydrantsOnMap();document.getElementById('my-list-modal').style.display='none';">지도에서 보기</button>
      <button class="map-btn" style="background:#bbb" onclick="document.getElementById('my-list-modal').style.display='none'">닫기</button>
    </div>
  </div>
</div>

<div id="loading">소방용수 데이터 로딩 중…</div>

  CODE_TO_STATION[s.code] = s.name;
  s.centers.forEach(c => { CODE_TO_CENTER[c.code] = c.name; });
});

  guSel.appendChild(opt);
});

const MARKER_BLUE = 'https://t1.daumcdn.net/localimg/localimages/07/2018/pc/img/marker_spot.png';
const MARKER_RED  = 'image/지상식 소화전1.png';

// ── Firebase ─────────────────────────────────────────────
firebase.initializeApp({
  apiKey:            "AIzaSyBdoXaUJz27J1zJ6CFuk7_xBWJCRGo0B4M",
  authDomain:        "fire-water-map.firebaseapp.com",
  projectId:         "fire-water-map",
  storageBucket:     "fire-water-map.firebasestorage.app",
  messagingSenderId: "879331522326",
  appId:             "1:879331522326:web:823f9b62ac6065ad0a8237"
});
const auth = firebase.auth();
const db   = firebase.firestore();

// ── 전역 상태 ─────────────────────────────────────────────
let allData       = null;
let statuses      = {};
let currentUser   = null;
let pendingId     = null;
let openInfoWin   = null;
let mapInstance   = null;
let activeMarkers = [];
let activeOverlays= [];
let activeDataMap = new Map();
let myHydrantIds  = new Set();

auth.onAuthStateChanged(user => {
  currentUser = user;
  document.getElementById('logout-btn').style.display        = user ? 'block' : 'none';
  document.getElementById('my-hydrants-btn').style.display   = user ? 'block' : 'none';
  document.getElementById('my-list-open-btn').style.display  = user ? 'block' : 'none';
  if (user) { loadStatusesFromFirestore(); loadMyHydrantsFromFirestore(); }
  else { myHydrantIds.clear(); }
});

// ── data.json 백그라운드 로드 ─────────────────────────────
function startDataLoad() {
  document.getElementById('loading').style.display = 'block';
  fetch('./data.json')
    .then(r => r.json())
    .then(rows => {
      allData = rows;
      document.getElementById('loading').style.display = 'none';
      showInitial();
    })
    .catch(e => {
      document.getElementById('loading').style.display = 'none';
      console.error('data.json 로드 실패:', e);
    });
}

// ── Firestore ─────────────────────────────────────────────
function loadStatusesFromFirestore() {
  db.collection('markerStatus').get()
    .then(snap => {
      snap.forEach(doc => { statuses[doc.id] = doc.data().status; });
      recolorActiveMarkers();
    })
    .catch(e => console.warn('Firestore 로드 실패:', e));
}

function saveStatusToFirestore(id, status) {
  db.collection('markerStatus').doc(String(id)).set({
    status, updatedBy: currentUser.email,
    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).catch(e => console.warn('Firestore 저장 실패:', e));
}

// ── 내 용수 ───────────────────────────────────────────────
function loadMyHydrantsFromFirestore() {
  db.collection('myHydrants')
    .where('userId', '==', currentUser.uid)
    .get()
    .then(snap => {
      myHydrantIds.clear();
      snap.forEach(doc => { myHydrantIds.add(String(doc.data().hydrantId)); });
    })
    .catch(e => console.warn('내 용수 로드 실패:', e));
}

window.handleMyHydrant = function(id) {
  if (!currentUser) { pendingId = id; showLoginModal(); return; }
  const docId = currentUser.uid + '_' + id;
  if (myHydrantIds.has(String(id))) {
    db.collection('myHydrants').doc(docId).delete()
      .then(() => {
        myHydrantIds.delete(String(id));
        if (openInfoWin) { openInfoWin.close(); openInfoWin = null; }
      })
      .catch(e => alert('내 용수 해제 실패: ' + e.message));
  } else {
    const hydrant = allData ? allData.find(d => String(d.id) === String(id)) : null;
    if (!hydrant) { alert('용수 데이터를 찾을 수 없습니다.'); return; }
    db.collection('myHydrants').doc(docId).set({
      userId: currentUser.uid,
      hydrantId: String(hydrant.id),
      lat: hydrant.lat, lng: hydrant.lng,
      addr: hydrant.addr || '', type: hydrant.type || '', cd: hydrant.cd || '',
      registeredAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(() => {
      myHydrantIds.add(String(id));
      if (openInfoWin) { openInfoWin.close(); openInfoWin = null; }
    }).catch(e => alert('내 용수 등록 실패: ' + e.message));
  }
};

window.loadMyHydrantsOnMap = function() {
  if (!currentUser) { showLoginModal(); return; }
  db.collection('myHydrants')
    .where('userId', '==', currentUser.uid)
    .get()
    .then(snap => {
      const items = [];
      snap.forEach(doc => {
        const d = doc.data();
        items.push({ id: d.hydrantId, lat: d.lat, lng: d.lng, addr: d.addr, type: d.type, cd: d.cd || '' });
      });
      if (items.length === 0) { alert('등록된 내 용수가 없습니다.'); return; }
      showResults(items);
    })
    .catch(e => alert('내 용수 불러오기 실패: ' + e.message));
};

// ── 내 용수 목록 모달 ─────────────────────────────────────
window.openMyHydrantsList = function() {
  if (!currentUser) { showLoginModal(); return; }
  document.getElementById('my-list-modal').style.display = 'flex';
  renderMyList();
};

function renderMyList() {
  const content = document.getElementById('my-list-content');
  content.innerHTML = '<div style="text-align:center;padding:24px;color:#aaa;">로딩 중...</div>';
  db.collection('myHydrants')
    .where('userId', '==', currentUser.uid)
    .get()
    .then(snap => {
      if (snap.empty) {
        content.innerHTML = '<div style="text-align:center;padding:24px;color:#aaa;">등록된 내 용수가 없습니다.</div>';
        return;
      }
      const rows = [];
      snap.forEach(doc => { rows.push(doc.data()); });
      content.innerHTML = rows.map(d => {
        const station = CODE_TO_STATION[(d.cd||'').slice(0,2)] || '';
        const center  = CODE_TO_CENTER[d.cd] || '';
        return `
          <div class="my-item">
            <div class="my-item-info">
              <div class="num">No. ${d.hydrantId}</div>
              <div class="sub">${station}${center ? ' &gt; ' + center : ''}</div>
              <div class="sub">${d.type || '-'} | ${d.addr || '-'}</div>
            </div>
            <button class="my-item-del" onclick="deleteMyHydrant('${d.hydrantId}')">삭제</button>
          </div>`;
      }).join('');
    })
    .catch(e => {
      content.innerHTML = '<div style="text-align:center;padding:16px;color:#e74c3c;">로드 실패</div>';
    });
}

window.deleteMyHydrant = function(id) {
  if (!currentUser) return;
  if (!confirm('No.' + id + ' 을(를) 내 용수에서 삭제하시겠습니까?')) return;
  const docId = currentUser.uid + '_' + id;
  db.collection('myHydrants').doc(docId).delete()
    .then(() => {
      myHydrantIds.delete(String(id));
      renderMyList();
    })
    .catch(e => alert('삭제 실패: ' + e.message));
};

function makeImg(src) {
  return new kakao.maps.MarkerImage(src, new kakao.maps.Size(36, 36));
}

function recolorActiveMarkers() {
  activeDataMap.forEach((d, idx) => {
    activeMarkers[idx]?.setImage(makeImg(statuses[d.id] === 'done' ? MARKER_RED : MARKER_BLUE));
  });
}

// ── 마커 생성 (결과에 한해서만) ───────────────────────────
function clearMarkers() {
  activeMarkers.forEach(m => m.setMap(null));
  activeOverlays.forEach(o => o.setMap(null));
  activeMarkers = []; activeOverlays = [];
  activeDataMap.clear();
  if (openInfoWin) { openInfoWin.close(); openInfoWin = null; }
}

function showResults(items) {
  clearMarkers();
  const countEl = document.getElementById('result-count');
  if (items.length === 0) {
    countEl.textContent = '결과 없음'; countEl.style.display = 'block'; return;
  }

  items.forEach((d, idx) => {
    const pos  = new kakao.maps.LatLng(d.lat, d.lng);
    const done = statuses[d.id] === 'done';
    const stationName = CODE_TO_STATION[d.cd.slice(0,2)] || '';
    const centerName  = CODE_TO_CENTER[d.cd] || '';

    const marker = new kakao.maps.Marker({
      position: pos,
      image: makeImg(done ? MARKER_RED : MARKER_BLUE)
    });
    marker.setMap(mapInstance);
    activeMarkers.push(marker);
    activeDataMap.set(idx, d);

    const overlay = new kakao.maps.CustomOverlay({
      content: `<div style="font-size:11px;color:#fff;background:rgba(0,0,0,.7);padding:1px 4px;border-radius:3px;white-space:nowrap;">${d.id}</div>`,
      position: pos, yAnchor: 2.8
    });
    overlay.setMap(mapInstance);
    activeOverlays.push(overlay);

    kakao.maps.event.addListener(marker, 'click', () => {
      if (openInfoWin) openInfoWin.close();
      const isDone = statuses[d.id] === 'done';
      const isMine = myHydrantIds.has(String(d.id));
      const myBtn  = currentUser ? `
        <button onclick="handleMyHydrant('${d.id}')" style="
          margin-top:4px;width:100%;padding:9px;
          background:${isMine ? '#e67e22' : '#3498db'};
          color:#fff;border:none;border-radius:6px;
          cursor:pointer;font-size:13px;font-weight:bold;">
          ${isMine ? '★ 내 용수 해제' : '☆ 내 용수 등록'}
        </button>` : '';
      const iw = new kakao.maps.InfoWindow({
        content: `
          <div style="padding:14px;min-width:200px;font-size:14px;line-height:1.9;">
            <b>용수번호:</b> ${d.id}<br>
            <b>소방서:</b> ${stationName}<br>
            <b>센터:</b> ${centerName}<br>
            <b>주소:</b> ${d.addr || '-'}<br>
            <b>종류:</b> ${d.type || '-'}<br>
            <button onclick="handleToggle('${d.id}')" style="
              margin-top:8px;width:100%;padding:9px;
              background:${isDone ? '#e74c3c' : '#2ab56f'};
              color:#fff;border:none;border-radius:6px;
              cursor:pointer;font-size:13px;font-weight:bold;">
              ${isDone ? '✕ 용수확인 취소' : '✓ 용수확인 완료'}
            </button>
            ${myBtn}
          </div>`
      });
      iw.open(mapInstance, marker);
      openInfoWin = iw;
    });
  });

  countEl.textContent = `${items.length}개`;
  countEl.style.display = 'block';
  mapInstance.panTo(new kakao.maps.LatLng(items[0].lat, items[0].lng));
}

function showInitial() {
  if (!allData || !mapInstance) return;
  showResults(allData.slice(0, 10));
}

// ── 용수확인 토글 ─────────────────────────────────────────
window.handleToggle = function(id) {
  if (!currentUser) { pendingId = id; showLoginModal(); }
  else toggleStatus(id);
};

function toggleStatus(id) {
  statuses[id] = statuses[id] !== 'done' ? 'done' : 'default';
  recolorActiveMarkers();
  if (openInfoWin) { openInfoWin.close(); openInfoWin = null; }
  saveStatusToFirestore(id, statuses[id]);
}

// ── 로그인/회원가입 모달 ──────────────────────────────────
let authMode = 'login'; // 'login' | 'signup'

window.switchTab = function(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('signup-pw2').style.display    = mode === 'signup' ? 'block' : 'none';
  document.getElementById('signup-notice').style.display = mode === 'signup' ? 'block' : 'none';
  document.getElementById('login-submit').textContent    = mode === 'login' ? '로그인' : '회원가입';
  document.getElementById('login-error').style.display   = 'none';
  document.getElementById('login-success').style.display = 'none';
};

function showLoginModal() {
  authMode = 'login';
  switchTab('login');
  document.getElementById('login-email').value  = '';
  document.getElementById('login-pw').value     = '';
  document.getElementById('signup-pw2').value   = '';
  document.getElementById('login-modal').style.display = 'flex';
}

function showMsg(type, text) {
  const errEl = document.getElementById('login-error');
  const okEl  = document.getElementById('login-success');
  errEl.style.display = 'none'; okEl.style.display = 'none';
  if (type === 'error') { errEl.textContent = text; errEl.style.display = 'block'; }
  else                  { okEl.textContent  = text; okEl.style.display  = 'block'; }
}

document.getElementById('login-submit').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-pw').value;
  const pw2   = document.getElementById('signup-pw2').value;

  if (!email || !pw) { showMsg('error', '이메일과 비밀번호를 입력해 주세요.'); return; }

  if (authMode === 'signup') {
    if (!email.endsWith('@seoul.go.kr')) {
      showMsg('error', '서울시 공무원 이메일(@seoul.go.kr)만 가입 가능합니다.');
      return;
    }
    if (pw !== pw2) { showMsg('error', '비밀번호가 일치하지 않습니다.'); return; }
    if (pw.length < 6) { showMsg('error', '비밀번호는 6자 이상이어야 합니다.'); return; }
    try {
      await auth.createUserWithEmailAndPassword(email, pw);
      document.getElementById('login-modal').style.display = 'none';
      if (pendingId !== null) { toggleStatus(pendingId); pendingId = null; }
    } catch (e) {
      const msg = e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일입니다.'
                : e.code === 'auth/invalid-email'        ? '이메일 형식이 올바르지 않습니다.'
                : '회원가입 실패: ' + e.message;
      showMsg('error', msg);
    }
  } else {
    try {
      await auth.signInWithEmailAndPassword(email, pw);
      document.getElementById('login-modal').style.display = 'none';
      if (pendingId !== null) { toggleStatus(pendingId); pendingId = null; }
    } catch (e) {
      const msg = e.code === 'auth/user-not-found'  ? '등록되지 않은 이메일입니다.'
                : e.code === 'auth/wrong-password'  ? '비밀번호가 올바르지 않습니다.'
                : e.code === 'auth/invalid-email'   ? '이메일 형식이 올바르지 않습니다.'
                : '로그인 실패: ' + e.message;
      showMsg('error', msg);
    }
  }
});

document.getElementById('login-cancel').addEventListener('click', () => {
  document.getElementById('login-modal').style.display = 'none';
  pendingId = null;
});

document.getElementById('logout-btn').addEventListener('click', () => auth.signOut());

// ── 카카오맵 초기화 ───────────────────────────────────────
kakao.maps.load(() => {
  mapInstance = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(37.5502, 126.9786),
    level: 8
  });

  kakao.maps.event.addListener(mapInstance, 'click', () => {
    if (openInfoWin) { openInfoWin.close(); openInfoWin = null; }
  });

  startDataLoad();

  const centerSel = document.getElementById('center-select');

  // 소방서 선택 → 센터 드롭다운 갱신 + 지도 이동
  guSel.addEventListener('change', () => {
    const station = FIRE_STATIONS.find(s => s.code === guSel.value);
    centerSel.innerHTML = '<option value="">-- 센터 선택 --</option>';
    if (station) {
      station.centers.forEach(c => {
        const opt = document.createElement('option');
        opt.value = c.code; opt.textContent = c.name;
        centerSel.appendChild(opt);
      });
      mapInstance.setCenter(new kakao.maps.LatLng(station.lat, station.lng));
      mapInstance.setLevel(6);
    }
    runSearch();
  });

  centerSel.addEventListener('change', runSearch);

  document.getElementById('searchBtn').addEventListener('click', runSearch);
  document.getElementById('search').addEventListener('keydown', e => {
    if (e.key === 'Enter') runSearch();
  });

  let locationOverlay = null;

  document.getElementById('location-btn').addEventListener('click', () => {
    if (!navigator.geolocation) { alert('위치 정보를 사용할 수 없습니다.'); return; }
    navigator.geolocation.getCurrentPosition(p => {
      const pos = new kakao.maps.LatLng(p.coords.latitude, p.coords.longitude);

      if (locationOverlay) locationOverlay.setMap(null);
      locationOverlay = new kakao.maps.CustomOverlay({
        position: pos,
        content: `<div style="
          width:22px;height:22px;
          background:#3b82f6;
          border:3px solid white;
          border-radius:50%;
          box-shadow:0 2px 8px rgba(0,0,0,.5);
          cursor:default;
        "></div>`,
        zIndex: 999,
        yAnchor: 0.5,
        xAnchor: 0.5
      });
      locationOverlay.setMap(mapInstance);
      mapInstance.setCenter(pos);
    }, () => alert('현재 위치를 가져올 수 없습니다.'));
  });

  function runSearch() {
    if (!allData) { alert('데이터 로딩 중입니다. 잠시 후 다시 시도해 주세요.'); return; }

    const stationCode = guSel.value;       // e.g. '81'
    const centerCode  = centerSel.value;   // e.g. '81251'
    const query       = document.getElementById('search').value.trim();

    let results = allData;

    // CD 코드로 정확한 필터링
    if (centerCode) {
      results = results.filter(d => d.cd === centerCode);
    } else if (stationCode) {
      results = results.filter(d => d.cd.startsWith(stationCode));
    }

    // 번호·주소 텍스트 검색
    if (query) {
      results = results.filter(d =>
        String(d.id).startsWith(query) || (d.addr || '').includes(query)
      );
    }

    showResults(results.slice(0, 300));
  }
});
</script>
